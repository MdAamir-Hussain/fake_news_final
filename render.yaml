services:
  - type: web
    name: truthlens-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python model_trainer.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
    plan: free
